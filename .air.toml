#:schema https://json.schemastore.org/any.json
# Air 配置文件
# 用于开发时进行热重载，自动监测代码变化并重新编译运行

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = ["receive"]
  bin = "./tmp/main.exe"
  cmd = "go build -o ./tmp/main.exe ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin", "logs", "uploads", "doc", "debian", "static"]
  exclude_file = []
  exclude_plain = ["*.md"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = []
  include_ext = ["go"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
