# Device name shown to other devices
# Leave empty to use random generated name
device_name: "MeowRain Device 1"

# Server configuration
server:
  # Enable HTTPS (recommended for security)
  https: true
  # Server port
  port: 53317

functions:
  http_file_server: true
  local_send_server: true

# Webhook configuration
webhook:
  # URL to send upload complete notifications to
  # Leave empty to disable webhook
  upload_complete_url: ""