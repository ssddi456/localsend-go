# Device name shown to other devices
# Leave empty to use random generated name
device_name: "MeowRain Device 1"

# Server configuration
server:
  # Enable HTTPS (recommended for security)
  https: true
  # Server port
  port: 53317

functions:
  http_file_server: true
  local_send_server: true
  # Enable ping scan for device discovery (high CPU usage, not recommended)
  ping_scan: false

# Webhook configuration
webhook:
  # Multiple webhook endpoints for upload complete notifications
  # Each endpoint has its own URL and parameters
  # Example:
  # upload_complete:
  #   - url: "https://api.example.com/webhook"
  #     type: "json"
  #     params:
  #       token: "your-api-token"
  #       channel: "uploads"
  #       message: "File {FileName} uploaded successfully"
  #   - url: "http://localhost:8080/notify"
  #     type: "json"
  #     params:
  #       notification_type: "file_upload"
  #       title: "Upload Complete: {FileName}"
  upload_complete:
    - url: "http://127.0.0.1:9090/api/upload"
      type: "upload"
      params:
        source: "localsend"
        status: "{Status}"